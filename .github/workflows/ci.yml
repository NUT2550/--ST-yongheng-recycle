# CI workflow for YH Stock System (ยงเฮง มหาชัย รีไซเคิล)
# Linear: ST-23
#
# Runs code-quality checks on pull requests to main and pushes to non-main branches.
# Does NOT deploy, does NOT touch Production database, does NOT run migrations.
#
# Required checks (for Branch Protection):
#   - Lint
#   - TypeScript Typecheck
#   - Unit Tests
#   - Production Build

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]

# Least-privilege: only read repo contents and PR metadata.
# No write permissions needed — CI is code-quality checks only.
permissions:
  contents: read
  pull-requests: read

# Cancel superseded runs on the same branch/PR to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies (lockfile-consistent)
        run: bun install --frozen-lockfile

      - name: Run ESLint
        run: bun run lint

  typecheck:
    name: TypeScript Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies (lockfile-consistent)
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bun run db:generate

      - name: TypeScript typecheck
        run: npx tsc --noEmit

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies (lockfile-consistent)
        run: bun install --frozen-lockfile

      - name: Run unit tests
        run: bun test

  build:
    name: Production Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # CI-only dummy secrets — NOT Production values.
      # JWT_SECRET: required by src/lib/auth.ts at module load time.
      # DATABASE_URL: required by Prisma at generate time; dummy SQLite file is syntactically valid.
      JWT_SECRET: ci-dummy-jwt-secret-not-for-production-use-only-000000000000000000000000000000000000
      DATABASE_URL: file:/tmp/ci-dummy.db
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            .next/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies (lockfile-consistent)
        run: bun install --frozen-lockfile

      - name: Production build (prisma generate + next build)
        run: bun run build
